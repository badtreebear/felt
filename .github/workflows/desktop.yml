name: Build desktop apps

# Builds UNSIGNED Windows (.msi/.exe), macOS (.dmg/.app) and Linux
# (.AppImage/.deb/.rpm) installers.
# Run it manually from the Actions tab, or push a version tag like v0.1.0.
# Artifacts are attached to a draft GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            rust-targets: ""
            args: ""
          - platform: ubuntu-latest
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Linux-only: Tauri needs WebKitGTK and friends present before the Rust
      # build. Windows/macOS runners ship the webview, so this step is skipped
      # there. (ubuntu-latest is 24.04 -> webkit2gtk 4.1.)
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libssl-dev libxdo-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # When triggered by a tag (e.g. v0.3.0), stamp that version into the files
      # the bundler reads, so the .msi/.exe/.dmg filenames match the tag instead
      # of the hardcoded 0.1.0. No effect on manual (workflow_dispatch) runs.
      - name: Set version from tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $VERSION"
          node -e '
            const fs = require("fs");
            const v = process.argv[1];
            for (const f of ["package.json", "src-tauri/tauri.conf.json"]) {
              const o = JSON.parse(fs.readFileSync(f, "utf8"));
              o.version = v;
              fs.writeFileSync(f, JSON.stringify(o, null, 2) + "\n");
            }
            const cargo = "src-tauri/Cargo.toml";
            const t = fs.readFileSync(cargo, "utf8").replace(/^version = ".*"/m, `version = "${v}"`);
            fs.writeFileSync(cargo, t);
          ' "$VERSION"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
          releaseName: "Felt Poker Trainer ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}"
          releaseBody: "Unsigned desktop builds. First launch shows an OS warning — see HOW-TO-DISTRIBUTE for the click-through."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
