name: Build desktop apps

# Builds UNSIGNED Windows (.msi/.exe) and macOS (.dmg/.app) installers.
# Run it manually from the Actions tab, or push a version tag like v0.1.0.
# Artifacts are attached to a draft GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
          releaseName: "Felt Poker Trainer ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}"
          releaseBody: "Unsigned desktop builds. First launch shows an OS warning — see HOW-TO-DISTRIBUTE for the click-through."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
