name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. The more specific the steps and seed, the faster it gets fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else trigger this?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: input
    id: seed
    attributes:
      label: Hand seed (if relevant)
      description: If it happened during a hand, paste the seed so it can be replayed.
      placeholder: e.g. 4vtuy4y8ymh3
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Felt version
      description: Shown in the app / matches the release you downloaded.
      placeholder: e.g. v0.6.0
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, error messages, or notes about your coach provider setup if related.
    validations:
      required: false
