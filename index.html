<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Felt is an interactive Texas Hold'em training table."
    />
    <!--
      Browser-build hardening: restrict outbound connections to same-origin,
      localhost, and the known AI providers, so the API key can't be sent to an
      arbitrary remote host. Only connect-src is set (not script/style), so Vite
      dev + HMR are unaffected. Keep this list in sync with the Tauri CSP in
      src-tauri/tauri.conf.json and the providers in src/coach/providers.js.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="connect-src 'self' http://localhost:* https://localhost:* ws://localhost:* http://127.0.0.1:* https://127.0.0.1:* ws://127.0.0.1:* https://api.openai.com https://openrouter.ai https://api.anthropic.com https://generativelanguage.googleapis.com https://api.deepseek.com https://api.x.ai https://api.groq.com"
    />
    <title>Felt Poker Trainer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
